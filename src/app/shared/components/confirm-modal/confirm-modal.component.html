<div class="modal-overlay" (click)="onCancelar()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button type="button" class="modal-close-btn" (click)="onCancelar()" aria-label="Cancelar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="modal-content">
      <h3>{{ titulo }}</h3>
      <p>{{ mensaje }}</p>
    </div>
    <div class="modal-actions">
      <button type="button" class="modal-btn-cancel" (click)="onCancelar()">Cancelar</button>
      <button type="button" class="modal-btn-confirm" (click)="onConfirmar()">Aceptar</button>
    </div>
  </div>
</div>
