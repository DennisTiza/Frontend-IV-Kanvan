<div class="modal-overlay" (click)="cerrarAlFondo($event)">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- HEADER -->
    <div class="modal-header">
      <div>
        <h3 class="modal-title" id="modal-title">Agregar Proceso</h3>
        <p class="modal-subtitle">Asocie un proceso a la secuencia de manufactura del producto.</p>
      </div>
      <button class="close-btn" (click)="cerrar()" aria-label="Cerrar modal">
        <!-- Icono close (SVG inline) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <!-- FORMULARIO -->
    <form [formGroup]="procesoForm" (ngSubmit)="guardar()" class="modal-body">

      <!-- Proceso -->
      <div class="form-group">
        <label class="label" for="procesoTexto">Proceso</label>
        <input
          id="procesoTexto"
          type="text"
          formControlName="procesoTexto"
          appBuscarSeleccionar
          [opciones]="opcionesProceso"
          [permitirPersonalizado]="false"
          placeholder="Buscar proceso..."
          (opcionSeleccionada)="onProcesoSeleccionado($event)"
          class="input"
          [class.input-error]="procesoForm.get('procesoTexto')?.invalid && procesoForm.get('procesoTexto')?.touched" />
        @if (procesoForm.get('procesoTexto')?.invalid && procesoForm.get('procesoTexto')?.touched) {
          <span class="error-msg">Seleccione un proceso.</span>
        }
      </div>



    </form>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="cerrar()">
        Cancelar
      </button>
      <button
        type="button"
        class="btn btn-primary"
        [disabled]="procesoForm.invalid || cargando"
        (click)="guardar()">
        @if (cargando) {
          <!-- Icono cargando (SVG inline animado) -->
          <svg xmlns="http://www.w3.org/2000/svg" class="spin" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          </svg>
        } @else {
          Agregar Proceso
        }
      </button>
    </div>

  </div>
</div>
