@if (visible) {
<div class="modal-overlay" (click)="cerrarAlFondo($event)">

    <div class="modal-container">

        <!-- Header -->
        <div class="modal-header">

            <div class="modal-title">
                <span>👤</span>
                <h3>Editar Usuario</h3>
            </div>

            <button class="close-btn" (click)="cerrar()" title="Cerrar">✖</button>

        </div>

        <!-- Body -->
        <form class="modal-body" [formGroup]="editForm" (ngSubmit)="guardarCambios()">

            <p class="modal-info">
                Actualice la información del usuario.
            </p>

            <!-- Nombre -->
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" formControlName="nombre" placeholder="Ej. Carlos">
            </div>

            <!-- Apellido -->
            <div class="form-group">
                <label>Apellido</label>
                <input type="text" formControlName="apellido" placeholder="Ej. Méndez">
            </div>

            <!-- Correo -->
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" formControlName="correo" placeholder="c.mendez@vatovi.com">
            </div>

            <div class="form-grid">

                <!-- Rol -->
                <div class="form-group">
                    <label>Rol</label>
                    <select formControlName="rolId">
                        <option value="" disabled>Seleccionar rol...</option>
                        @for (rol of roles; track rol.id) {
                            <option [value]="rol.id">{{ rol.Nombre }}</option>
                        }
                    </select>
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label>Nueva Contraseña <span class="optional">(opcional)</span></label>
                    <div class="password-field">
                        <input [type]="mostrarClave ? 'text' : 'password'" formControlName="clave"
                            placeholder="••••••••">
                        <span class="password-icon" (click)="toggleClave()">
                            @if (mostrarClave) {
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            } @else {
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                <line x1="2" y1="2" x2="22" y2="22" />
                            </svg>
                            }
                        </span>
                    </div>
                </div>

            </div>

        </form>

        <!-- Footer -->
        <div class="modal-footer">

            <button class="cancel-btn" type="button" (click)="cerrar()">
                Cancelar
            </button>

            <button class="save-btn" type="button" (click)="guardarCambios()" [disabled]="editForm.invalid">
                Guardar Cambios
            </button>

        </div>

    </div>

</div>
}
